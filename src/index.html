<!doctype html>
<html lang=""en"">
<head>
  <meta charset=""utf-8"">
  <title>Nova</title>
  <base href=""/"">
  <meta name=""viewport"" content=""width=device-width, initial-scale=1"">
  <link rel=""icon"" type=""image/x-icon"" href=""""> <!-- Removed Angular favicon -->
  <link href=""https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"" rel=""stylesheet"" integrity=""sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"" crossorigin=""anonymous"">
  <link rel=""stylesheet"" href=""https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"">
  <style>
    .global-loader-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #0b0f19; /* Nova Dark */
      position: absolute;
      top: 0;
      left: 0;
      z-index: 9999;
    }
    .nova-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0, 204, 255, 0.2);
      border-top-color: #00ccff; /* Nova Accent */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .nova-loading-text {
      color: white;
      font-family: 'Inter', sans-serif;
      margin-top: 20px;
      letter-spacing: 2px;
      font-weight: 500;
    }
    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
  </style>
</head>
<body class=""bg-dark text-light"">
  <app-root>
    <!-- Pre-Bootstrap Global Loader -->
    <div class=""global-loader-container"">
      <div class=""loader-content"">
        <div class=""nova-spinner""></div>
        <div class=""nova-loading-text"">INIZIALIZZAZIONE NOVA...</div>
      </div>
    </div>
  </app-root>
  <script src=""https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"" integrity=""sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"" crossorigin=""anonymous""></script>
</body>
</html>
